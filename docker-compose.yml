version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dompetrack-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: dompetrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dompetrack-backend
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/dompetrack?schema=public
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-production-super-secret-access-token-key-change-me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-production-super-secret-refresh-token-key-change-me}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - PORT=3000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
    container_name: dompetrack-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
